appId: com.infinitecode.desktop
productName: InfiniteCode
copyright: Copyright (c) 2025 InfiniteCode Contributors
directories:
  buildResources: resources
  output: release

files:
  - "out/**/*"
  # Native N-API addon for macOS liquid glass / vibrancy effects.
  # Must be included because externalizeDepsPlugin keeps it external.
  - "node_modules/electron-liquid-glass/**/*"

# Bundle the private InfiniteCode runtime into the app package.
# macOS: Contents/Resources/runtime/bin/infinitecode
# Linux: resources/runtime/bin/infinitecode
# Windows: resources/runtime/bin/infinitecode.exe
extraResources:
  - from: resources/runtime
    to: runtime
    filter:
      - "**/*"
  # Tray icon assets — must be at the root of process.resourcesPath
  # so tray.ts can find them via path.join(process.resourcesPath, "...").
  - from: resources/iconTemplate.png
    to: iconTemplate.png
  - from: resources/iconTemplate@2x.png
    to: iconTemplate@2x.png
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon-macos.png
    to: icon-macos.png
  - from: resources/iconTray.png
    to: iconTray.png

# Rebuild native modules for Electron's Node.js ABI during packaging.
npmRebuild: true

artifactName: "infinitecode-desktop-${version}-${os}-${arch}.${ext}"

# Inject version from package.json into the built app
extraMetadata:
  main: ./out/main/index.js

mac:
  icon: resources/icon.icns
  target:
    - target: dmg
    - target: zip
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  # Notarization — uncomment when Apple credentials are configured
  # notarize:
  #   teamId: ${env.APPLE_TEAM_ID}

win:
  icon: resources/icon.ico
  target:
    - target: nsis

linux:
  executableName: infinitecode
  icon: resources/linux-icons
  target:
    - target: AppImage
    - target: deb
    - target: rpm
  category: Development
  maintainer: infinitecode
  desktop:
    entry:
      Name: InfiniteCode
      Comment: AI-powered coding assistant
      Categories: Development;IDE;
      StartupWMClass: InfiniteCode

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: AFS-Agentics
  repo: infinitecode
  releaseType: draft
