<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <title>InfiniteCode</title>
    <!-- Adsterra ads — containers + scripts are created dynamically by
         AdsterraAd component. This inline script discovers all
         [id^="container-"] elements and handles pill styling, regex/ML
         moderation, and retry for each one. -->
    <style>
      /* Adsterra containers render freely — no opacity blocking.
         The IIFE below handles pill styling and optional ML moderation,
         but does NOT prevent the ad from being visible. */
      [id^="container-"] { all: unset; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
    </style>
    <script>
      (function () {
        // ─── MODERATION KILL SWITCH (renderer-side only) ───
        // Disabled per user request for ad-inspection pass.
        //
        // Restoring: flip `MODERATION_DISABLED` to `false` (one char).
        //
        // When disabled: the renderer still applies the full custom
        // styling (rounded cards, hover, "Ad" label, image sizing,
        // separator dot) but skips the zero-shot ML check + retry
        // pipeline, so all ads render immediately as their creative
        // dictates.
        //
        // ⚠  The main-process `preloadClassifier()` in
        //    apps/desktop/src/main/index.ts still warms
        //    `Xenova/nli-deberta-v3-small` (~30 MB) on cold start —
        //    stub that out separately if zero footprint is desired.
        const MODERATION_DISABLED = true
        // ───────────────────────────────────────────────────

        // ── No regex patterns ──
        // All moderation is done by the ML zero-shot classifier via IPC.
        // Ads stay hidden until ML clears them (deferred-visibility).

        // ── Per-container retry state ──
        var MOD_RETRY = {}
        var MOD_RETRY_MAX = 3
        var MOD_RETRY_DELAY = 45000

        function getContainerScriptSrc(container) {
          return container.getAttribute("data-adsterra-src") || ""
        }

        function queueAdRefresh(containerId) {
          MOD_RETRY[containerId] = MOD_RETRY[containerId] || { count: 0, time: 0 }
          if (MOD_RETRY[containerId].count >= MOD_RETRY_MAX) return
          MOD_RETRY[containerId].time = Date.now() + MOD_RETRY_DELAY
        }

        // Track nofill containers (invoke.js loaded but returned no ad content)
        var NOFILL_RETRY = {} // containerId -> { count, time }

        function refreshContainer(container, src) {
          container.innerHTML = ""
          container.classList.remove("ad-styled")
          container.style.setProperty("opacity", "0", "important")
          if (src) {
            var old = document.querySelector('script[src="' + src + '"]')
            if (old) old.remove()
            var s = document.createElement("script")
            s.src = src
            s.setAttribute("data-cfasync", "false")
            s.async = true
            document.head.appendChild(s)
          }
        }

        function processAdRefresh() {
          var containers = document.querySelectorAll('[id^="container-"]')
          for (var c = 0; c < containers.length; c++) {
            var cid = containers[c].id

            // ── Process ML-flagged ad retries ──
            var entry = MOD_RETRY[cid]
            if (entry && entry.count < MOD_RETRY_MAX && Date.now() >= entry.time) {
              entry.count++
              entry.time = Date.now() + MOD_RETRY_DELAY
              refreshContainer(containers[c], getContainerScriptSrc(containers[c]))
              continue
            }

            // ── Detect nofill: container has been loaded but is still empty ──
            var hasContent = containers[c].querySelector('[class*="__bn"]:not([class*="__bn-container"])')
            if (!hasContent) {
              var src = getContainerScriptSrc(containers[c])
              if (!src) continue

              // Track first time we see this container empty
              if (!NOFILL_RETRY[cid]) {
                NOFILL_RETRY[cid] = { count: 0, time: Date.now() + MOD_RETRY_DELAY }
                continue
              }

              // Retry if enough time has passed and under max retries
              if (NOFILL_RETRY[cid].count >= MOD_RETRY_MAX) continue
              if (Date.now() < NOFILL_RETRY[cid].time) continue

              NOFILL_RETRY[cid].count++
              NOFILL_RETRY[cid].time = Date.now() + MOD_RETRY_DELAY
              refreshContainer(containers[c], src)
            }
          }
        }

        // ── ML check state per ad text ──
        // mlChecked[adText]  = true when ML check has been fired at least once
        // mlCleared[adText]  = true when ML returned "not flagged" (or error)
        // mlFlagged[adText]  = true when ML returned "flagged"
        // mlInFlight[adText] = true while IPC request is pending
        var mlChecked = {}
        var mlCleared = {}
        var mlFlagged = {}
        var mlInFlight = {}

        function hideAdAndRetry(bn, adText, containerId) {
          bn.style.setProperty("display", "none", "important")
          mlChecked[adText] = true
          mlFlagged[adText] = true
          delete mlCleared[adText]
          queueAdRefresh(containerId)
        }

        function checkAdTextML(bn, adText, containerId) {
          // Kill switch: when disabled, treat every ad as already cleared
          // so styling applies immediately without any IPC or model work.
          if (MODERATION_DISABLED) {
            mlChecked[adText] = true
            mlCleared[adText] = true
            return
          }
          if (!window.infinitecode || !window.infinitecode.moderation) return
          if (mlChecked[adText] || mlInFlight[adText]) return
          mlInFlight[adText] = true
          mlChecked[adText] = true
          window.infinitecode.moderation.checkAdText(adText).then(function (result) {
            delete mlInFlight[adText]
            if (result.flagged) {
              hideAdAndRetry(bn, adText, containerId)
            } else {
              mlCleared[adText] = true
              // Re-run styling to show the now-cleared ad
              setTimeout(styleAllAds, 0)
            }
          }).catch(function () {
            // IPC error — conservative: clear the ad so it shows anyway
            delete mlInFlight[adText]
            mlCleared[adText] = true
            setTimeout(styleAllAds, 0)
          })
        }

        function styleContainer(container) {
          var containerId = container.id
          container.querySelectorAll('[class*="__stand-name"],[class*="__cancel-btn"],[class*="__report-container"],[class*="__report-final"]').forEach(function (el) {
            el.style.setProperty("display", "none", "important")
          })
          container.querySelectorAll('[class*="__bn-container"]').forEach(function (bnc) {
            bnc.style.setProperty("display", "flex", "important")
            bnc.style.setProperty("justify-content", "center", "important")
            bnc.style.setProperty("width", "100%", "important")
            bnc.style.setProperty("background", "transparent", "important")
            bnc.style.setProperty("border", "none", "important")
            bnc.style.setProperty("padding", "0", "important")
          })
          var bns = container.querySelectorAll('[class*="__bn"]:not([class*="__bn-container"])')
          var anyAdShown = false
          for (var i = 0; i < bns.length; i++) {
            var bn = bns[i]

            // Extract ad text from ALL text-bearing elements in the banner.
            // Adsterra doesn't always use __title-classed elements, so we
            // collect from any element that contains non-empty text.
            var adText = ""
            var textEls = bn.querySelectorAll('[class*="__title"],[class*="__description"],[class*="__text"],[class*="__name"],[class*="__headline"],[class*="__snippet"]')
            for (var ti = 0; ti < textEls.length; ti++) {
              var t = (textEls[ti].textContent || "").trim()
              if (t.length > adText.length) adText = t
            }
            // Fallback: grab the first non-empty textContent in the banner
            if (!adText) {
              adText = (bn.textContent || "").trim().substring(0, 200)
            }

            // 1) Fire ML check if not yet checked
            if (!mlChecked[adText]) {
              checkAdTextML(bn, adText, containerId)
            }

            // 3) If ML flagged this text on a previous run, hide it
            if (mlFlagged[adText]) {
              bn.style.setProperty("display", "none", "important")
              continue
            }

            // 4) Only count as "shown" if ML has cleared this text
            //    (or errored). While ML is in flight, the ad stays hidden.
            if (!mlCleared[adText]) {
              // ML still pending — keep this specific ad hidden
              bn.style.setProperty("display", "none", "important")
              continue
            }

            anyAdShown = true

            bn.style.setProperty("display", "flex", "important")
            bn.style.setProperty("flex-direction", "row", "important")
            bn.style.setProperty("align-items", "center", "important")
            bn.style.setProperty("gap", "12px", "important")
            bn.style.setProperty("max-width", "520px", "important")
            bn.style.setProperty("width", "100%", "important")
            bn.style.setProperty("padding", "8px 12px", "important")
            bn.style.setProperty("background-color", "var(--card)", "important")
            bn.style.setProperty("border", "1px solid var(--border)", "important")
            bn.style.setProperty("border-radius", "8px", "important")
            bn.style.setProperty("min-height", "56px", "important")
            bn.style.setProperty("transition", "background-color 0.15s", "important")
            bn.style.setProperty("cursor", "pointer", "important")
            bn.style.setProperty("text-decoration", "none", "important")
            bn.onmouseenter = function () { this.style.setProperty("background-color", "var(--accent)", "important") }
            bn.onmouseleave = function () { this.style.setProperty("background-color", "var(--card)", "important") }
            bn.querySelectorAll('[class*="__img-container"]').forEach(function (imgc) {
              imgc.style.setProperty("width", "40px", "important")
              imgc.style.setProperty("height", "40px", "important")
              imgc.style.setProperty("min-width", "40px", "important")
              imgc.style.setProperty("max-width", "40px", "important")
              imgc.style.setProperty("max-height", "40px", "important")
              imgc.style.setProperty("overflow", "hidden", "important")
              imgc.style.setProperty("border-radius", "2px", "important")
              imgc.style.setProperty("flex-shrink", "0", "important")
              imgc.style.setProperty("background", "var(--muted)", "important")
            })
            bn.querySelectorAll('[class*="__img"]').forEach(function (img) {
              img.style.setProperty("width", "100%", "important")
              img.style.setProperty("height", "100%", "important")
              img.style.setProperty("background-size", "cover", "important")
              img.style.setProperty("background-position", "center", "important")
            })
            if (bn.querySelector('[class*="__img-container"]') && !bn.querySelector("[data-separator]")) {
              var sep = document.createElement("span")
              sep.setAttribute("data-separator", "1")
              sep.textContent = "\u00B7"
              sep.style.cssText = "font-size:14px;line-height:1;opacity:0.5;color:var(--muted-foreground);flex-shrink:0;align-self:center;"
              var imgc = bn.querySelector('[class*="__img-container"]')
              if (imgc && imgc.nextSibling) bn.insertBefore(sep, imgc.nextSibling)
              else bn.appendChild(sep)
            }
            bn.querySelectorAll('[class*="__title"]').forEach(function (title) {
              title.style.setProperty("display", "flex", "important")
              title.style.setProperty("align-items", "center", "important")
              title.style.setProperty("font-size", "13px", "important")
              title.style.setProperty("font-weight", "400", "important")
              title.style.setProperty("line-height", "normal", "important")
              title.style.setProperty("text-align", "left", "important")
              title.style.setProperty("white-space", "nowrap", "important")
              title.style.setProperty("overflow", "hidden", "important")
              title.style.setProperty("text-overflow", "ellipsis", "important")
              title.style.setProperty("color", "var(--muted-foreground)", "important")
              title.style.setProperty("flex", "1", "important")
              title.style.setProperty("min-width", "0", "important")
              title.style.setProperty("align-self", "center", "important")
            })
            bn.querySelectorAll('[class*="__link"]').forEach(function (link) {
              link.style.setProperty("flex", "0 0 0", "important")
              link.style.setProperty("min-width", "0", "important")
              link.style.setProperty("overflow", "hidden", "important")
            })
            if (!bn.querySelector("[data-ad-label]")) {
              var adLabel = document.createElement("span")
              adLabel.setAttribute("data-ad-label", "1")
              adLabel.textContent = "Ad"
              adLabel.style.cssText = "font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;opacity:0.7;color:var(--muted-foreground);flex-shrink:0;line-height:1;white-space:nowrap;align-self:center;"
              bn.appendChild(adLabel)
            }
          }
          // Manage container visibility via !important so Adsterra's
          // invoke.js can't override it with inline styles.
          // When MODERATION_DISABLED, we only ever promote to opacity 1 —
          // never force opacity 0 — so refreshContainer's startup zero gets
          // undone as soon as content arrives.
          if (anyAdShown) {
            container.classList.add("ad-styled")
            container.style.setProperty("opacity", "1", "important")
          } else if (!MODERATION_DISABLED) {
            container.classList.remove("ad-styled")
            container.style.setProperty("opacity", "0", "important")
          }
        }

        function styleAllAds() {
          var containers = document.querySelectorAll('[id^="container-"]')
          for (var c = 0; c < containers.length; c++) {
            styleContainer(containers[c])
          }
        }

        // ── Bootstrap ──
        // Defer one tick so the preload bridge's `window.infinitecode`
        // object is fully wired before the IIFE first polls for
        // moderation. Without this, `checkAdTextML` early-returns silently
        // when `window.infinitecode.moderation` is undefined and the very
        // first batch of containers added during cold-boot would skip ML
        // classification. The MutationObserver re-poll eventually catches
        // up, but deferring the bootstrap removes the startup race.
        setTimeout(styleAllAds, 0)
        var aggroCount = 0
        var aggroTimer = setInterval(function () { styleAllAds(); aggroCount++; if (aggroCount >= 150) clearInterval(aggroTimer) }, 100)
        setInterval(styleAllAds, 2000)
        setInterval(processAdRefresh, 10000)

        // Watch body for new containers or ad content.
        // Defer one tick via DOMContentLoaded so `document.body` is parsed
        // (this IIFE runs in <head> before <body>, so `document.body` is
        // null at execution time and `MutationObserver.observe()` throws
        // "parameter 1 is not of type 'Node'". Safe because no Adsterra
        // container exists yet on first paint — we'll start watching as
        // soon as the body node exists.)
        function watchBody() {
          if (!document.body) {
            if (document.readyState === "loading") {
              document.addEventListener("DOMContentLoaded", watchBody, { once: true })
            } else {
              setTimeout(watchBody, 0)
            }
            return
          }
          var bodyMo = new MutationObserver(function () { styleAllAds() })
          bodyMo.observe(document.body, { childList: true, subtree: true })
        }
        watchBody()
      })()
    </script>
    <style>
      /* Splash screen styles -- inlined so they render before any JS loads. */
      html {
        --infinitecode-startup-background: #181818;
        background: var(--infinitecode-startup-background);
      }
      html.light {
        --infinitecode-startup-background: #ffffff;
      }
      body {
        background: var(--infinitecode-startup-background);
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        background: var(--infinitecode-startup-background);
        transition: opacity 300ms ease-out;
        /* Allow dragging the window from the splash on macOS */
        -webkit-app-region: drag;
      }
      #splash.hiding {
        opacity: 0;
        pointer-events: none;
      }
      .splash-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .splash-logo-img {
        height: 96px;
        width: auto;
        object-fit: contain;
        margin-bottom: 24px;
      }
      .splash-copyright {
        padding-bottom: 16px;
        text-align: center;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .infinitecode-splash-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: hsl(var(--foreground, 0 0% 93%));
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 32px;
        font-weight: 650;
        letter-spacing: 0;
        line-height: 1.2;
        white-space: nowrap;
      }
      .infinitecode-splash-brand-mark-frame {
        display: inline-flex;
        width: 64px;
        height: 64px;
        flex-shrink: 0;
        align-items: center;
        justify-content: center;
      }
      .infinitecode-splash-brand-mark {
        width: 64px;
        height: 64px;
        flex-shrink: 0;
      }
      .infinitecode-brand-mark-attention {
        animation: infinitecode-brand-mark-attention 1.45s cubic-bezier(0.18, 0.82, 0.22, 1)
          both;
        transform-origin: center;
      }
      .infinitecode-brand-word {
        display: inline-grid;
        height: 1.2em;
        line-height: 1.2;
        overflow: hidden;
      }
      .infinitecode-brand-word-track {
        display: flex;
        flex-direction: column;
        transform: translateY(-2.4em);
      }
      .infinitecode-brand-word-track > span {
        height: 1.2em;
      }
      .infinitecode-brand-word-attention .infinitecode-brand-word-track {
        animation: infinitecode-brand-word-carousel 1.05s cubic-bezier(0.18, 0.82, 0.22, 1)
          both;
      }
      #splash .infinitecode-loading-dots {
        --infinitecode-loading-dot-idle: color-mix(in srgb, #60a5fa 18%, rgb(176 174 173));
        --infinitecode-loading-dot-active: #60a5fa;
        display: flex;
        align-items: center;
        gap: 7px;
        margin-top: 32px;
      }
      #splash .infinitecode-loading-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--infinitecode-loading-dot-idle);
        animation: infinitecode-loading-dot 1.16s ease-in-out infinite;
        opacity: 0.45;
        transform: scale(0.86);
      }
      #splash .infinitecode-loading-dots span:nth-child(2) { animation-delay: 160ms; }
      #splash .infinitecode-loading-dots span:nth-child(3) { animation-delay: 320ms; }
      @keyframes infinitecode-loading-dot {
        0%, 100% {
          background: var(--infinitecode-loading-dot-idle);
          box-shadow: 0 0 0 rgb(96 165 250 / 0);
          opacity: 0.45;
          transform: translateY(0) scale(0.86);
        }
        28% {
          background: var(--infinitecode-loading-dot-active);
          box-shadow: 0 0 12px rgb(96 165 250 / 0.5);
          opacity: 1;
          transform: translateY(-1px) scale(1.18);
        }
        56% {
          background: var(--infinitecode-loading-dot-idle);
          box-shadow: 0 0 0 rgb(96 165 250 / 0);
          opacity: 0.55;
          transform: translateY(0) scale(0.92);
        }
      }
      @keyframes infinitecode-brand-mark-attention {
        0% {
          transform: rotate(0deg) scale(1);
        }

        42% {
          transform: rotate(285deg) scale(1.08);
        }

        72% {
          transform: rotate(368deg) scale(0.98);
        }

        100% {
          transform: rotate(360deg) scale(1);
        }
      }
      @keyframes infinitecode-brand-word-carousel {
        0% {
          filter: blur(1.5px);
          opacity: 0.58;
          transform: translateY(0);
        }

        34% {
          filter: blur(0.8px);
          opacity: 0.82;
          transform: translateY(-1.2em);
        }

        74%,
        100% {
          filter: blur(0);
          opacity: 1;
          transform: translateY(-2.4em);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .infinitecode-brand-mark-attention,
        .infinitecode-brand-word-attention .infinitecode-brand-word-track {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <script>
      // Prevent flash of wrong color scheme before React hydrates.
      // Reads from the same localStorage keys used by Jotai atomWithStorage.
      try {
        var scheme = JSON.parse(localStorage.getItem('infinitecode:colorScheme') || '"dark"');
        var themeId = JSON.parse(localStorage.getItem('infinitecode:theme') || '"default"');
        var cls = scheme;
        if (scheme === 'system') {
          cls = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(cls);
        if (themeId !== 'default') {
          document.documentElement.classList.add('theme-' + themeId);
        }
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <script>
      // React Scan: dev-only render visualizer. Loaded via script tag outside
      // Vite's module graph so it survives HMR. Uses document.write to ensure
      // the script loads synchronously before React's module script executes.
      // Toggle via Command Palette (Cmd+K > "React Scan"). Only active in dev
      // since production React builds don't expose the DevTools hook.
      try {
        if (localStorage.getItem('infinitecode:reactScan') === 'true') {
          document.write('<script src="https://unpkg.com/react-scan/dist/auto.global.js"><\/script>');
        }
      } catch (e) {}
    </script>
    <!-- Splash screen: renders immediately before React/JS loads.
         The React StartupOverlay component removes this element once it mounts. -->
    <div id="splash">
      <div class="splash-body">
      <img src="/logo.png" alt="InfiniteCode" class="splash-logo-img" />
      <div class="infinitecode-loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
      <p class="splash-copyright">© 2026 AFS Agentics</p>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
