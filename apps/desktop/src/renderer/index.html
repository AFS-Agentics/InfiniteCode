<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <title>InfiniteCode</title>
    <!-- Adsterra ads — containers + scripts are created dynamically by the
         AdsterraAd component. Moderation and retry live in that component. -->
    <style>
      /* Splash screen styles -- inlined so they render before any JS loads. */
      html {
        --infinitecode-startup-background: #181818;
        background: var(--infinitecode-startup-background);
      }
      html.light {
        --infinitecode-startup-background: #ffffff;
      }
      body {
        background: var(--infinitecode-startup-background);
      }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        background: var(--infinitecode-startup-background);
        transition: opacity 300ms ease-out;
        /* Allow dragging the window from the splash on macOS */
        -webkit-app-region: drag;
      }
      #splash.hiding {
        opacity: 0;
        pointer-events: none;
      }
      .splash-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .splash-logo-img {
        height: 96px;
        width: auto;
        object-fit: contain;
        margin-bottom: 24px;
      }
      .splash-copyright {
        padding-bottom: 16px;
        text-align: center;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.4);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .infinitecode-splash-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: hsl(var(--foreground, 0 0% 93%));
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 32px;
        font-weight: 650;
        letter-spacing: 0;
        line-height: 1.2;
        white-space: nowrap;
      }
      .infinitecode-splash-brand-mark-frame {
        display: inline-flex;
        width: 64px;
        height: 64px;
        flex-shrink: 0;
        align-items: center;
        justify-content: center;
      }
      .infinitecode-splash-brand-mark {
        width: 64px;
        height: 64px;
        flex-shrink: 0;
      }
      .infinitecode-brand-mark-attention {
        animation: infinitecode-brand-mark-attention 1.45s cubic-bezier(0.18, 0.82, 0.22, 1)
          both;
        transform-origin: center;
      }
      .infinitecode-brand-word {
        display: inline-grid;
        height: 1.2em;
        line-height: 1.2;
        overflow: hidden;
      }
      .infinitecode-brand-word-track {
        display: flex;
        flex-direction: column;
        transform: translateY(-2.4em);
      }
      .infinitecode-brand-word-track > span {
        height: 1.2em;
      }
      .infinitecode-brand-word-attention .infinitecode-brand-word-track {
        animation: infinitecode-brand-word-carousel 1.05s cubic-bezier(0.18, 0.82, 0.22, 1)
          both;
      }
      #splash .infinitecode-loading-dots {
        --infinitecode-loading-dot-idle: color-mix(in srgb, #60a5fa 18%, rgb(176 174 173));
        --infinitecode-loading-dot-active: #60a5fa;
        display: flex;
        align-items: center;
        gap: 7px;
        margin-top: 32px;
      }
      #splash .infinitecode-loading-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--infinitecode-loading-dot-idle);
        animation: infinitecode-loading-dot 1.16s ease-in-out infinite;
        opacity: 0.45;
        transform: scale(0.86);
      }
      #splash .infinitecode-loading-dots span:nth-child(2) { animation-delay: 160ms; }
      #splash .infinitecode-loading-dots span:nth-child(3) { animation-delay: 320ms; }
      @keyframes infinitecode-loading-dot {
        0%, 100% {
          background: var(--infinitecode-loading-dot-idle);
          box-shadow: 0 0 0 rgb(96 165 250 / 0);
          opacity: 0.45;
          transform: translateY(0) scale(0.86);
        }
        28% {
          background: var(--infinitecode-loading-dot-active);
          box-shadow: 0 0 12px rgb(96 165 250 / 0.5);
          opacity: 1;
          transform: translateY(-1px) scale(1.18);
        }
        56% {
          background: var(--infinitecode-loading-dot-idle);
          box-shadow: 0 0 0 rgb(96 165 250 / 0);
          opacity: 0.55;
          transform: translateY(0) scale(0.92);
        }
      }
      @keyframes infinitecode-brand-mark-attention {
        0% {
          transform: rotate(0deg) scale(1);
        }

        42% {
          transform: rotate(285deg) scale(1.08);
        }

        72% {
          transform: rotate(368deg) scale(0.98);
        }

        100% {
          transform: rotate(360deg) scale(1);
        }
      }
      @keyframes infinitecode-brand-word-carousel {
        0% {
          filter: blur(1.5px);
          opacity: 0.58;
          transform: translateY(0);
        }

        34% {
          filter: blur(0.8px);
          opacity: 0.82;
          transform: translateY(-1.2em);
        }

        74%,
        100% {
          filter: blur(0);
          opacity: 1;
          transform: translateY(-2.4em);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .infinitecode-brand-mark-attention,
        .infinitecode-brand-word-attention .infinitecode-brand-word-track {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <script>
      // Prevent flash of wrong color scheme before React hydrates.
      // Reads from the same localStorage keys used by Jotai atomWithStorage.
      try {
        var scheme = JSON.parse(localStorage.getItem('infinitecode:colorScheme') || '"dark"');
        var themeId = JSON.parse(localStorage.getItem('infinitecode:theme') || '"default"');
        var cls = scheme;
        if (scheme === 'system') {
          cls = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(cls);
        if (themeId !== 'default') {
          document.documentElement.classList.add('theme-' + themeId);
        }
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <script>
      // React Scan: dev-only render visualizer. Loaded via script tag outside
      // Vite's module graph so it survives HMR. Uses document.write to ensure
      // the script loads synchronously before React's module script executes.
      // Toggle via Command Palette (Cmd+K > "React Scan"). Only active in dev
      // since production React builds don't expose the DevTools hook.
      try {
        if (localStorage.getItem('infinitecode:reactScan') === 'true') {
          document.write('<script src="https://unpkg.com/react-scan/dist/auto.global.js"><\/script>');
        }
      } catch (e) {}
    </script>
    <!-- Splash screen: renders immediately before React/JS loads.
         The React StartupOverlay component removes this element once it mounts. -->
    <div id="splash">
      <div class="splash-body">
      <img src="/logo.png" alt="InfiniteCode" class="splash-logo-img" />
      <div class="infinitecode-loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
      <p class="splash-copyright">© 2026 AFS Agentics</p>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
